name: hazam
services: 
  postgres: 
    image: postgres:16-alpine
    container_name: hazamDb
    restart: no 
    environment: 
       POSTGRES_USER: ${DB_USERNAME}
       POSTGRES_PASSWORD: ${DB_PASSWORD}
       POSTGRES_DB: ${DB_NAME}
    ports: 
      - "5432:5432"
    volumes:
      - hazamData:/var/lib/postgresql/data
volumes:
  hazamData:
